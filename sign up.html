<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign up.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Betong Thai</title>
</head>

<body>
    <img src="thai food2.jpg" alt="Thai Food Platter Image" class="bg-photo">

    <main class="card">
        <img src="Betong Thai Logo (1).png" alt="Betong Thai Logo" class="logo-mark"> 
        <h1>Sign Up</h1>
        <p class="subtitle">Already have an account? <a href="login.html"> Sign in </a> </p>
    
        <div class="accessibility-controls">
            <button id="contrastBtn" aria-label="Toggle high contrast mode">
                🌙 High Contrast
            </button>
        </div>

        <button type="button" class="btn btn-facebook">
            <img src="Black and Orange Maverick Crew Entertainment Logo (4).png" class="icon-img" alt="Facebook Logo">
            Sign in with Facebook
        </button>

        <button type="button" class="btn btn-google">
           <img src="Black and Orange Maverick Crew Entertainment Logo (3).png" class="icon-img" alt="Google Logo">
            Sign in with Google
        </button>

        <button type="button" class="btn btn-apple">
            <img src="Black and Orange Maverick Crew Entertainment Logo (2).png" class="icon-img" alt="Apple Logo">
            Sign in with Apple
        </button>
    
        <div class="divider" role="separator">or</div>

        <form class="signup-form" novalidate>

            <div class="field">
                <label for="name" class="sr-only"> Full Name</label>
                <input type="text" id="name" placeholder="Full Name" aria-describedby="name-error" required>
                <p class="field-error" id="name-error" aria-live="polite"></p>
            </div>

            <div class="field">
                <label for="email" class="sr-only"> Email</label>
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" aria-describedby="email-error" required>
                <p class="field-error" id="email-error" aria-live="polite"></p>
            </div>
            
            <div class="field">
                <label for="password" class="sr-only">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" autocomplete="password" aria-describedby="password-error" required>
                
                <button type="button" class="toggle-pw" aria-label="Show Password" aria-pressed="false">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            
                <p class="field-error" id="password-error" aria-live="polite"></p>
            </div>

            <div class="field">
                <label for="confirm" class="sr-only"> Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" autocomplete="new-password" aria-describedby="confirm-error" required>
                <button type="button" class="toggle-pw confirm-toggle" aria-label="Show Password" aria-pressed="false">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>

                <p class="field-error" id="confirm-error" aria-live="polite"></p>
            </div>

            
            <button type="submit" class="btn btn-signup">
                <span class="btn-label"> Create Account</span>
            </button>
             <div class="form-alert" id="form-alert" role="alert" hidden></div>
        </form>

        </main>

        <script src="sign up.js"></script>
        <script src="accessibility.js"></script>
</body>
</html>
